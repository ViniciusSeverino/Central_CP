<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central CP</title>
<meta name="theme-color" content="#0A4038">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="src/icons/favicon-32.png" type="image/png">
<link rel="apple-touch-icon" href="src/icons/apple-touch-icon.png">
<!-- iOS não segue o manifest.json completamente -- essas 3 tags são o
     que faz "Adicionar à Tela de Início" abrir em tela cheia (sem barra
     do Safari) e mostrar o nome certo no ícone. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Central CP">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/css/styles.css">
<link rel="stylesheet" href="src/css/mobile.css">
</head>
<body>
<div id="app"></div>
<!-- Pré-visualização de anexo em tela cheia (ver renderPreviewAnexos em
     ui_nota.js / bindExpandirPreview em events_notas.js) -- fica fora de
     #app de propósito, pra sobreviver a qualquer render() enquanto
     estiver aberta. -->
<div id="preview-lightbox" class="preview-lightbox" hidden>
  <div class="preview-lightbox-topo">
    <div class="preview-lightbox-zoom-controles" id="preview-lightbox-zoom-controles">
      <button type="button" id="preview-lightbox-zoom-menos" aria-label="Diminuir zoom">−</button>
      <span id="preview-lightbox-zoom-valor">100%</span>
      <button type="button" id="preview-lightbox-zoom-mais" aria-label="Aumentar zoom">+</button>
      <button type="button" id="preview-lightbox-zoom-reset">Ajustar</button>
    </div>
    <button type="button" id="preview-lightbox-fechar">✕ Fechar</button>
  </div>
  <div class="preview-lightbox-corpo" id="preview-lightbox-corpo"></div>
</div>
<script type="module" src="src/js/app.js"></script>
</body>
</html>
